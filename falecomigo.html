<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Comigo - Canal de Contato</title>
    <link rel="stylesheet" href="falecomigo.css">
</head>
<body>

    <div class="form-container">
        <h2>Fale Conosco</h2>
        <p>Preencha o formulário abaixo para enviar sua proposta ou dúvida diretamente.</p>
        
        <form action="#" method="POST" onsubmit="alert('Mensagem enviada com sucesso!'); return false;">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: Maria Oliveira">
            </div>

            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <input type="email" id="email" required placeholder="Ex: maria@empresa.com">
            </div>

            <div class="form-group">
                <label for="assunto">Motivo do Contato</label>
                <select id="assunto" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="proposta">Proposta Comercial</option>
                    <option value="parceria">Parcerias Corporativas</option>
                    <option value="suporte">Suporte Técnico</option>
                </select>
            </div>

            <div class="form-group">
                <label for="mensagem">Detalhamento da Mensagem</label>
                <textarea id="mensagem" required placeholder="Descreva sua solicitação com detalhes..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Enviar Mensagem</button>
        </form>

        <a href="index.html" class="back-btn">&larr; Voltar para a Home</a>
    </div>

</body>
</html>
